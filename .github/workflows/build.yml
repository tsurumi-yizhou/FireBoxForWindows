name: Build

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Compute build metadata
        id: meta
        shell: pwsh
        run: |
          $assetSuffix = $env:GITHUB_REF_NAME
          if ([string]::IsNullOrWhiteSpace($assetSuffix)) {
            $assetSuffix = "manual-$env:GITHUB_RUN_NUMBER"
          }

          $packageVersion = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            "0.0.0-ci.$env:GITHUB_RUN_NUMBER"
          }

          if ([string]::IsNullOrWhiteSpace($packageVersion)) {
            throw "Package version could not be resolved."
          }

          "asset_suffix=$assetSuffix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore solution
        run: dotnet restore FireBox.slnx -p:Platform=x64 -p:PublishReadyToRun=true

      - name: Build solution
        run: dotnet build FireBox.slnx -c Release -p:Platform=x64 -p:ContinuousIntegrationBuild=true --no-restore

      - name: Build App MSIX
        run: >-
          dotnet msbuild App\App.csproj /t:Build
          /p:Configuration=Release
          /p:Platform=x64
          /p:RuntimeIdentifier=win-x64
          /p:ContinuousIntegrationBuild=true
          /p:WindowsPackageType=MSIX
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=AppPackages\App\
          /p:AppxPackageSigningEnabled=false
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxBundle=Never

      - name: Restore Demo packaging assets
        run: dotnet restore Demo\Demo.csproj -p:RuntimeIdentifier=win-x64 -p:Platform=x64

      - name: Build Demo MSIX
        run: >-
          dotnet msbuild Demo\Demo.csproj /t:Build
          /p:Configuration=Release
          /p:Platform=x64
          /p:RuntimeIdentifier=win-x64
          /p:ContinuousIntegrationBuild=true
          /p:WindowsPackageType=MSIX
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=AppPackages\Demo\
          /p:AppxPackageSigningEnabled=false
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxBundle=Never

      - name: Pack Client SDK
        run: >-
          dotnet pack Client\Client.csproj
          -c Release
          -p:Platform=x64
          -p:ContinuousIntegrationBuild=true
          -p:PackageId=FireBox.Client
          -p:PackageVersion=${{ steps.meta.outputs.package_version }}
          --no-build
          -o artifacts\Client

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts\release -Force | Out-Null

          $appMsix = Get-ChildItem -Path App\AppPackages -Recurse -Filter *.msix |
            Where-Object { $_.DirectoryName -notmatch '\\Dependencies(\\|$)' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $appMsix) {
            throw 'App MSIX was not generated.'
          }

          $demoMsix = Get-ChildItem -Path Demo\AppPackages -Recurse -Filter *.msix |
            Where-Object { $_.DirectoryName -notmatch '\\Dependencies(\\|$)' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $demoMsix) {
            throw 'Demo MSIX was not generated.'
          }

          $clientSdk = Get-ChildItem -Path artifacts\Client -Filter *.nupkg |
            Where-Object { $_.Name -notlike '*.snupkg' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $clientSdk) {
            throw 'Client SDK package was not generated.'
          }

          $suffix = '${{ steps.meta.outputs.asset_suffix }}'
          $appAsset = Join-Path $PWD "artifacts\release\FireBox-App-$suffix.msix"
          $demoAsset = Join-Path $PWD "artifacts\release\FireBox-Demo-$suffix.msix"
          $clientAsset = Join-Path $PWD "artifacts\release\FireBox-Client-SDK-$suffix.nupkg"

          Copy-Item $appMsix.FullName $appAsset -Force
          Copy-Item $demoMsix.FullName $demoAsset -Force
          Copy-Item $clientSdk.FullName $clientAsset -Force

          "app_asset=$appAsset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "demo_asset=$demoAsset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "client_asset=$clientAsset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # Never upload artifacts

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.app_asset }}
            ${{ steps.assets.outputs.demo_asset }}
            ${{ steps.assets.outputs.client_asset }}
