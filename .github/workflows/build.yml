name: Build

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore FireBox.slnx -p:Platform=x64 -p:RuntimeIdentifier=win-x64

      - name: Build solution
        run: dotnet build FireBox.slnx -c Release -p:Platform=x64 --no-restore

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore FireBox.slnx -p:Platform=x64 -p:RuntimeIdentifier=win-x64

      - name: Build App MSIX
        run: >-
          dotnet msbuild App\App.csproj /t:Build
          /p:Configuration=Release
          /p:Platform=x64
          /p:RuntimeIdentifier=win-x64
          /p:WindowsPackageType=MSIX
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=AppPackages\App\
          /p:AppxPackageSigningEnabled=false
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxBundle=Never

      - name: Restore Demo packaging assets
        run: dotnet restore Demo\Demo.csproj -p:RuntimeIdentifier=win-x64 -p:Platform=x64

      - name: Build Demo MSIX
        run: >-
          dotnet msbuild Demo\Demo.csproj /t:Build
          /p:Configuration=Release
          /p:Platform=x64
          /p:RuntimeIdentifier=win-x64
          /p:WindowsPackageType=MSIX
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=AppPackages\Demo\
          /p:AppxPackageSigningEnabled=false
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxBundle=Never

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null

          $appMsix = Get-ChildItem -Path App\AppPackages -Recurse -Filter *.msix |
            Sort-Object FullName |
            Select-Object -First 1
          if ($null -eq $appMsix) {
            throw 'App MSIX was not generated.'
          }

          $demoMsix = Get-ChildItem -Path Demo\AppPackages -Recurse -Filter *.msix |
            Sort-Object FullName |
            Select-Object -First 1
          if ($null -eq $demoMsix) {
            throw 'Demo MSIX was not generated.'
          }

          $appAsset = Join-Path $PWD "artifacts/FireBox-App-$env:GITHUB_REF_NAME.msix"
          $demoAsset = Join-Path $PWD "artifacts/FireBox-Demo-$env:GITHUB_REF_NAME.msix"

          Copy-Item $appMsix.FullName $appAsset -Force
          Copy-Item $demoMsix.FullName $demoAsset -Force

          "app_asset=$appAsset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "demo_asset=$demoAsset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.app_asset }}
            ${{ steps.assets.outputs.demo_asset }}